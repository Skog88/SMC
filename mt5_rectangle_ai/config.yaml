system:
  timezone: "Europe/Oslo"
  mode: "demo"
  mt5_mcp_server: "C:/mt5-mcp/mt5_mcp_server.py"
  symbols:
    - "EURUSD"
    - "GBPUSD"
    - "XAUUSD"
    - "NAS100"

timeframes:
  setup: "M15"
  entry: "M1"

htf:
  timeframe: "H4"
  swing_left: 3
  swing_right: 3
  max_bos_age_candles: 50
  require_confirmed_bos: true

confluence:
  min_score: 40

confluence_weights:
  htf_bias_aligned: 20
  in_kill_zone: 20
  swept_liquidity_pool: 15
  ob_unmitigated: 15
  ob_fvg_overlap: 10
  premium_discount_correct: 10
  ob_rectangle_overlap: 5
  ob_h4_timeframe: 10
  claude_clean_sweep: 5
  claude_ob_visible: 5
  claude_draw_visible: 5
  claude_would_trade: -999
  ob_mitigation_count_1: -10
  ob_mitigation_count_2plus: -25
  outside_kill_zone: -30

premium_discount:
  enabled: true
  hard_filter: false
  equilibrium_buffer_pct: 5.0

kill_zones:
  london_open:
    start: "08:00"
    end: "10:00"
  new_york_open:
    start: "15:30"
    end: "17:30"
  london_close:
    start: "15:00"
    end: "16:00"
  enabled: true
  hard_filter: false

liquidity:
  equal_level_buffer_points:
    default: 5
    forex: 5
    metals: 100
    indices: 200
  min_touches: 2
  lookback_candles: 60

order_block:
  max_lookback_candles: 20
  require_ob: true
  require_unmitigated: true
  max_mitigation_count: 1
  min_ob_size_points:
    default: 5
    forex: 5
    metals: 50
    indices: 100

# Per-category point values resolve: exact symbol name -> category -> default.
structure:
  swing_left: 2
  swing_right: 2
  max_level_age_candles: 40

sweep:
  mode: "wick_close_colour"

rectangle:
  min_size_points:
    default: 5
    forex: 5
    metals: 200
    indices: 200
  max_size_points:
    default: 200
    forex: 100
    metals: 3000
    indices: 5000
  expires_after_m1_candles: 30

m1_flip:
  require_closed_candle: true
  max_wait_candles: 0
  flip_buffer_points: 0
  entry_mode: "market_after_close"

ai:
  enabled: true
  model: "claude-sonnet-4-6"
  prompt_version: "v3_smc_checklist"
  min_confluence_count: 5
  require_would_trade: true
  reject_on_invalid_json: true
  timeout_seconds: 30
  min_confidence: 60

risk:
  risk_per_trade_percent: 0.5
  max_daily_loss_percent: 2.0
  max_open_positions: 2
  max_trades_per_symbol_per_day: 1
  max_total_trades_per_day: 3
  min_rr: 3.0

execution_filters:
  max_spread_points:
    default: 30
    EURUSD: 15
    GBPUSD: 20
    XAUUSD: 60
    NAS100: 300
  max_slippage_points:
    default: 10

sl:
  buffer_points:
    default: 5
    forex: 0
    metals: 20
    indices: 50

tp:
  mode: "fixed_rr"
  rr: 3.0
